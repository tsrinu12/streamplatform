name: CD - Development

on:
  push:
    branches:
      - main
    paths:
      - 'services/**'
      - 'helm/streamplatform/**'
      - '.github/workflows/cd-dev.yaml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment: development
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActionsRole-dev
          aws-region: us-east-1
          role-session-name: GitHubActions-cd-dev

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name streamplatform-dev --region us-east-1

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: '3.13.0'

      - name: Deploy to Development
        run: |
          helm upgrade --install streamplatform ./helm/streamplatform \\
          --namespace development \\
          --create-namespace \\
          --values helm/streamplatform/values-dev.yaml \\
          --set image.tag=${{ github.sha }} \\
          --wait \\
          --timeout 10m
