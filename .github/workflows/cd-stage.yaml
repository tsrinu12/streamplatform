name: CD - Staging

on:
  push:
    tags:
      - 'v*.*.*-rc*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.ref_name }}
        run: |
          for service in auth-service video-service ai-service reward-service notification-service web-app; do
            docker build -t $ECR_REGISTRY/streamplatform-$service:$IMAGE_TAG ./services/$service
            docker push $ECR_REGISTRY/streamplatform-$service:$IMAGE_TAG
          done

      - name: Install Helm
        uses: azure/setup-helm@v3

      - name: Deploy to EKS
        run: |
          aws eks update-kubeconfig --name streamplatform-stage
          helm upgrade --install streamplatform ./helm/streamplatform \
            --namespace staging \
            --create-namespace \
            --values ./helm/streamplatform/values-stage.yaml \
            --set image.tag=${{ github.ref_name }}
