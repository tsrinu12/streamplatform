name: CI Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

env:
  NODE_VERSION: '20.x'
  GO_VERSION: '1.21'
  PYTHON_VERSION: '3.11'

jobs:
  # ================== NODE.JS SERVICES ==================
  lint-and-test-node:
    name: Lint & Test Node Services (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - user-service
          - recommendation-service
          - notification-service
          - payment-service
          - analytics-service
          - search-service
          - content-service
          - streaming-service
          - auth-service
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'services/${{ matrix.service }}/package-lock.json'

      - name: Install dependencies
        run: npm ci --prefix services/${{ matrix.service }}

      - name: Run ESLint
        run: npm run lint --prefix services/${{ matrix.service }}
        continue-on-error: true

      - name: Run TypeScript check
        run: npm run type-check --prefix services/${{ matrix.service }}
        continue-on-error: true

      - name: Run unit tests
        run: npm run test --prefix services/${{ matrix.service }}
        continue-on-error: true

      - name: Build service
        run: npm run build --prefix services/${{ matrix.service }}
        continue-on-error: true

  # ================== GO SERVICES ==================
  lint-and-test-go:
    name: Lint & Test Go Services (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - video-service
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: 'services/${{ matrix.service }}/go.sum'

      - name: Download dependencies
        run: cd services/${{ matrix.service }} && go mod download

      - name: Format check
        run: cd services/${{ matrix.service }} && go fmt ./...

      - name: Vet
        run: cd services/${{ matrix.service }} && go vet ./...

      - name: Run tests
        run: cd services/${{ matrix.service }} && go test -v -race ./...
        continue-on-error: true

      - name: Build
        run: cd services/${{ matrix.service }} && go build -o ${{ matrix.service }}

  # ================== PYTHON SERVICES ==================
  lint-and-test-python:
    name: Lint & Test Python Services (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - ai-service
          - reward-service
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'services/${{ matrix.service }}/requirements*.txt'

      - name: Install dependencies
        run: |
          cd services/${{ matrix.service }}
          pip install -r requirements-dev.txt

      - name: Black format check
        run: cd services/${{ matrix.service }} && black --check .
        continue-on-error: true

      - name: Pylint
        run: cd services/${{ matrix.service }} && pylint src/
        continue-on-error: true

      - name: Pytest with coverage
        run: cd services/${{ matrix.service }} && pytest --cov=src tests/
        continue-on-error: true

  # ================== FRONTEND ==================
  lint-and-test-frontend:
    name: Lint & Test Frontend (web-app)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'frontend/web-app/package-lock.json'

      - name: Install dependencies
        run: npm ci --prefix frontend/web-app

      - name: Run ESLint
        run: npm run lint --prefix frontend/web-app
        continue-on-error: true

      - name: TypeScript check
        run: npm run type-check --prefix frontend/web-app
        continue-on-error: true

      - name: Build frontend
        run: npm run build --prefix frontend/web-app
        continue-on-error: true

      - name: Run tests
        run: npm run test --prefix frontend/web-app
        continue-on-error: true

  # ================== SECURITY SCAN ==================
  security-scan:
    name: Security Scan (Semgrep + NPM Audit)
    runs-on: ubuntu-latest
    needs: [lint-and-test-node, lint-and-test-go, lint-and-test-python]
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/secrets
            p/owasp-top-ten
        continue-on-error: true

      - name: NPM audit for all Node services
        run: |
          for dir in services/api-gateway services/user-service services/recommendation-service services/notification-service services/payment-service services/analytics-service services/search-service services/content-service services/streaming-service services/auth-service frontend/web-app; do
            if [ -f "$dir/package.json" ]; then
              echo "Auditing $dir..."
              npm audit --prefix $dir --audit-level=high || true
            fi
          done
        continue-on-error: true
