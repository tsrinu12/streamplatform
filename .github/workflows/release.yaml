name: Create Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        type: string
        default: 'v1.0.0'
      prerelease:
        description: 'Mark as prerelease'
        required: false
        type: boolean
        default: false

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      tag_name: ${{ steps.get_version.outputs.tag_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: get_version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "tag_name=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag_name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Generate changelog
        id: changelog
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREVIOUS_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges $PREVIOUS_TAG..HEAD)
          fi
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.tag_name }}
          name: StreamPlatform ${{ steps.get_version.outputs.tag_name }}
          body: |
            ## Changes
            ${{ steps.changelog.outputs.CHANGELOG }}

            ## Docker Images
            All services have been built and pushed to ECR:
            ${{ env.ECR_REGISTRY }}/streamplatform/<service>:${{ steps.get_version.outputs.tag_name }}

          draft: false
          prerelease: ${{ github.event.inputs.prerelease || false }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-release-images:
    name: Build Release Images
    runs-on: ubuntu-latest
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - user-service
          - video-service
          - recommendation-service
          - notification-service
          - payment-service
          - analytics-service
          - search-service
          - content-service
          - streaming-service
          - auth-service

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActionsRole-ecr
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push release image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ needs.create-release.outputs.tag_name }}
        run: |
          cd services/${{ matrix.service }}
          docker build -t $ECR_REGISTRY/streamplatform/${{ matrix.service }}:$IMAGE_TAG .
          docker push $ECR_REGISTRY/streamplatform/${{ matrix.service }}:$IMAGE_TAG
          echo "Release image: $ECR_REGISTRY/streamplatform/${{ matrix.service }}:$IMAGE_TAG"

  scan-release-images:
    name: Scan Release Images
    runs-on: ubuntu-latest
    needs: [create-release, build-release-images]
    if: always()

    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - user-service
          - video-service
          - recommendation-service
          - notification-service
          - payment-service
          - analytics-service
          - search-service
          - content-service
          - streaming-service
          - auth-service

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActionsRole-ecr
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Trivy scan release image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: '${{ steps.login-ecr.outputs.registry }}/streamplatform/${{ matrix.service }}:${{ needs.create-release.outputs.tag_name }}'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  deploy-release:
    name: Deploy to Environment
    runs-on: ubuntu-latest
    needs: [create-release, build-release-images, scan-release-images]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment != ''

    environment:
      name: ${{ github.event.inputs.environment }}
      url: https://${{ github.event.inputs.environment }}.streamplatform.com

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActionsRole-eks
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          CLUSTER_NAME=$(aws eks list-clusters --query clusters[0] --output text)
          aws eks update-kubeconfig --name $CLUSTER_NAME --region ${{ env.AWS_REGION }}

      - name: Deploy with Helm
        env:
          IMAGE_TAG: ${{ needs.create-release.outputs.tag_name }}
          ENVIRONMENT: ${{ github.event.inputs.environment }}
        run: |
          echo "Deploying version $IMAGE_TAG to $ENVIRONMENT environment"
          helm upgrade --install streamplatform ./helm/streamplatform \
            --namespace $ENVIRONMENT \
            --create-namespace \
            --set image.tag=$IMAGE_TAG \
            --set environment=$ENVIRONMENT \
            --wait --timeout 10m
