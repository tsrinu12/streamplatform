version: '3.8'

services:
  # Database Services
  postgres:
    image: postgres:15-alpine
    container_name: streamplatform-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-streamuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-streampass}
      POSTGRES_DB: ${DB_NAME:-streamdb}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - streamplatform

  mongodb:
    image: mongo:6.0-alpine
    container_name: streamplatform-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-streamuser}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-streampass}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - streamplatform

  redis:
    image: redis:7-alpine
    container_name: streamplatform-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - streamplatform

  # Message Queue
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: streamplatform-kafka
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper
    networks:
      - streamplatform

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: streamplatform-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - streamplatform

  # Search and Analytics
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.0
    container_name: streamplatform-elasticsearch
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=false
    ports:
      - "${ES_PORT:-9200}:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - streamplatform

  # Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: streamplatform-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - streamplatform

  grafana:
    image: grafana/grafana:latest
    container_name: streamplatform-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - streamplatform

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  elasticsearch_data:
  prometheus_data:
  grafana_data:

networks:
  streamplatform:
    driver: bridge
