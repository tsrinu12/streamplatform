apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "streamplatform.fullname" . }}
  labels:
    {{- include "streamplatform.labels" . | nindent 4 }}
data:
  # Application configuration
  APP_ENV: {{ .Values.environment }}
  LOG_LEVEL: {{ .Values.config.logLevel }}
  
  # Database configuration
  DB_HOST: {{ .Values.config.database.host }}
  DB_PORT: {{ .Values.config.database.port | quote }}
  DB_NAME: {{ .Values.config.database.name }}
  
  # Redis configuration
  REDIS_HOST: {{ .Values.config.redis.host }}
  REDIS_PORT: {{ .Values.config.redis.port | quote }}
  
  # Kafka configuration
  KAFKA_BROKERS: {{ .Values.config.kafka.brokers }}
  
  # S3 configuration
  S3_BUCKET: {{ .Values.config.s3.bucket }}
  S3_REGION: {{ .Values.config.s3.region }}
  
  # Video processing
  VIDEO_QUALITY_LEVELS: {{ .Values.config.video.qualityLevels }}
  VIDEO_CHUNK_DURATION: {{ .Values.config.video.chunkDuration | quote }}
  
  # AI service
  AI_MODEL_PATH: {{ .Values.config.ai.modelPath }}
  AI_BATCH_SIZE: {{ .Values.config.ai.batchSize | quote }}
