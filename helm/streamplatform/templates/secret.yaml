apiVersion: v1
kind: Secret
metadata:
  name: {{ include "streamplatform.fullname" . }}
  labels:
    {{- include "streamplatform.labels" . | nindent 4 }}
type: Opaque
data:
  # Database credentials
  DB_USERNAME: {{ .Values.secrets.database.username | b64enc | quote }}
  DB_PASSWORD: {{ .Values.secrets.database.password | b64enc | quote }}
  
  # Redis password
  REDIS_PASSWORD: {{ .Values.secrets.redis.password | b64enc | quote }}
  
  # JWT secrets
  JWT_SECRET: {{ .Values.secrets.jwt.secret | b64enc | quote }}
  JWT_REFRESH_SECRET: {{ .Values.secrets.jwt.refreshSecret | b64enc | quote }}
  
  # AWS credentials
  AWS_ACCESS_KEY_ID: {{ .Values.secrets.aws.accessKeyId | b64enc | quote }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.secrets.aws.secretAccessKey | b64enc | quote }}
  
  # API keys
  STRIPE_SECRET_KEY: {{ .Values.secrets.stripe.secretKey | b64enc | quote }}
  SENDGRID_API_KEY: {{ .Values.secrets.sendgrid.apiKey | b64enc | quote }}
  
  # Encryption key
  ENCRYPTION_KEY: {{ .Values.secrets.encryption.key | b64enc | quote }}
