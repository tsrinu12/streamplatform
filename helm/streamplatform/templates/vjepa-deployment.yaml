{{- if .Values.vjepa.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vjepa-service
  labels:
    app: vjepa-service
    tier: ai
spec:
  replicas: {{ .Values.vjepa.replicaCount }}
  selector:
    matchLabels:
      app: vjepa-service
  template:
    metadata:
      labels:
        app: vjepa-service
        sidecar.istio.io/inject: "true"
    spec:
      containers:
      - name: vjepa-service
        image: "{{ .Values.vjepa.image.repository }}:{{ .Values.vjepa.image.tag }}"
        ports:
        - containerPort: 8000
        env:
        - name: MODEL_PATH
          value: {{ .Values.vjepa.env.MODEL_PATH | quote }}
        - name: ENABLE_GPU
          value: {{ .Values.vjepa.env.ENABLE_GPU | quote }}
        - name: DB_HOST
          value: {{ .Values.config.database.host | quote }}
        - name: S3_BUCKET
          value: {{ .Values.config.s3.bucket | quote }}
        resources:
          {{- toYaml .Values.vjepa.resources | nindent 10 }}
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 60
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
      {{- with .Values.vjepa.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
