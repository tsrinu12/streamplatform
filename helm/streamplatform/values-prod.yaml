# StreamPlatform Production Helm Values
# Environment: production
# Region: ap-south-1

global:
  environment: production
  region: ap-south-1
  domain: api.streamplatform.com

# AI Services Configurations
vjepa:
  enabled: true
  replicaCount: 3
  image:
    repository: tsrinu12/vjepa-service
    tag: latest
  resources:
    requests:
      cpu: "2"
      memory: "8Gi"
    limits:
      cpu: "4"
      memory: "16Gi"
      nvidia.com/gpu: 1
  env:
    MODEL_PATH: "/models/vjepa_main.pth"
    ENABLE_GPU: "true"
  nodeSelector:
    instance-type: p3.2xlarge # GPU instance

nlp:
  enabled: true
  replicaCount: 5
  image:
    repository: tsrinu12/nlp-service
    tag: latest
  resources:
    requests:
      cpu: "1"
      memory: "4Gi"
    limits:
      cpu: "2"
      memory: "8Gi"

search:
  enabled: true
  replicaCount: 5
  image:
    repository: tsrinu12/search-service
    tag: latest
  resources:
    requests:
      cpu: "500m"
      memory: "2Gi"
    limits:
      cpu: "1"
      memory: "4Gi"

# Shared Infrastructure
config:
  logLevel: "info"
  database:
    host: "streamplatform-prod-db.ap-south-1.docdb.amazonaws.com"
    port: 27017
  redis:
    host: "streamplatform-prod-redis.ap-south-1.cache.amazonaws.com"
  kafka:
    brokers: "msk-broker-1.ap-south-1.amazonaws.com:9092,msk-broker-2.ap-south-1.amazonaws.com:9092"
  s3:
    bucket: "streamplatform-prod-data"
    region: "ap-south-1"

# Service Mesh (Istio)
istio:
  enabled: true
  injection: enabled
  mtls:
    mode: STRICT

# Ingress / Edge Security
ingress:
  enabled: true
  className: "alb"
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
  hosts:
    - host: api.streamplatform.com
      paths:
        - path: /vjepa
          service: vjepa-service
        - path: /nlp
          service: nlp-service
        - path: /search
          service: search-service
