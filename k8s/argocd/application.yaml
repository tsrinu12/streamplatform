application.yaml  apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: streamplatform-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/tsrinu12/streamplatform.git'
    targetRevision: HEAD
    path: helm/streamplatform
    helm:
      valueFiles:
        - values-dev.yaml
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
